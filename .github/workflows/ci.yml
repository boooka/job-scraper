name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/job-scraper

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run black (check only)
        run: poetry run black --check src/ tests/

      # Advisory only: the codebase has pre-existing strict-typing debt
      # (variable reuse in handlers, async-generator inference, etc.). Ruff +
      # Black are the enforced gates; mypy is reported but does not fail CI
      # until the strict debt is paid down.
      - name: Run mypy
        run: poetry run mypy src/ --ignore-missing-imports
        continue-on-error: true

  # ── Tests ─────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: job_scraper_test
          POSTGRES_USER: scraper
          POSTGRES_PASSWORD: scraper_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scraper -d job_scraper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run migrations on test DB
        env:
          DATABASE_URL: postgresql+asyncpg://scraper:scraper_pass@localhost:5432/job_scraper_test
        run: poetry run alembic upgrade head

      - name: Migration smoke test (downgrade/upgrade on clean DB)
        env:
          DATABASE_URL: postgresql+asyncpg://scraper:scraper_pass@localhost:5432/job_scraper_test
        run: |
          poetry run alembic downgrade base
          poetry run alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://scraper:scraper_pass@localhost:5432/job_scraper_test
        run: |
          poetry run pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Build & Push Docker image ─────────────────────────────────────
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (SSH to server) ────────────────────────────────────────
  # Runs only after lint AND test pass on a push to main, so production never
  # gets code that failed the gates. Git-based: the server pulls main and
  # rebuilds via deploy-local.sh (backup + migrations + rebuild).
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH (git pull + rebuild)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/job_scraper
            git fetch origin --quiet
            git checkout -B main origin/main
            export COMPOSE_FILE=docker-compose.prod.yml
            ./deploy/deploy-local.sh update
